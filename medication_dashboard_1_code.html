<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Medication Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
      background-color: #FFDBFD;
      color: #2C3E50;
    }

    .large-text-btn {
      font-size: 1.25rem;
      font-weight: 700;
    }
  </style>
</head>

<body class="min-h-screen p-4">
  <header class="mb-8 pt-4">
    <h1 class="text-4xl font-extrabold text-gray-900 mb-2">My Daily Meds</h1>
    <p class="text-xl text-gray-600 font-semibold" id="current-date">Loading date...</p>
  </header>

  <main id="medication-container" class="space-y-8 pb-24">
    <!-- 자바스크립트가 여기에 약 목록을 생성합니다 -->
    <p class="text-center text-gray-500">Connecting to server...</p>
  </main>

  <script>
    const API_BASE = "http://127.0.0.1:8000";

    // 1. 대시보드 데이터 불러오기 및 화면 그리기
    async function loadDashboard() {
      try {
        const response = await fetch(`${API_BASE}/api/dashboard`);
        const data = await response.json();

        // 날짜 업데이트
        document.getElementById('current-date').innerText = data.date_display;

        const container = document.getElementById('medication-container');
        container.innerHTML = ""; // 기존 내용 비우기

        // 시간대별 그룹 순회 (Morning, Afternoon, Evening)
        for (const [time, meds] of Object.entries(data.grouped_medications)) {
          if (meds.length === 0) continue;

          const section = document.createElement('section');
          section.innerHTML = `
            <div class="flex items-center gap-3 mb-4 mt-6">
              <h2 class="text-3xl font-bold capitalize">${time}</h2>
            </div>
          `;

          meds.forEach(item => {
            const med = item.medication;
            const isTaken = item.is_taken;

            const card = document.createElement('article');
            card.className = "bg-white rounded-3xl shadow-lg border-2 border-gray-100 p-5 mb-4";
            card.innerHTML = `
              <div class="flex justify-between items-start mb-4">
                <div>
                  <h3 class="text-2xl font-black text-gray-900">${med.name}</h3>
                  <p class="text-lg text-gray-700 mt-1">${med.purpose}</p>
                </div>
                <div class="flex flex-col items-center">
                  <span class="${isTaken ? 'text-[#6367FF]' : 'text-gray-300'}">
                    <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                  </span>
                  <span class="text-sm font-bold uppercase">${isTaken ? 'Taken' : 'Pending'}</span>
                </div>
              </div>
              <button 
                onclick="${isTaken ? `undoMedication('${med.id}')` : `takeMedication('${med.id}')`}"
                class="w-full ${isTaken ? 'bg-gray-100 text-gray-500' : 'bg-[#6367FF] text-white'} py-5 rounded-2xl large-text-btn shadow-md border-b-4 ${isTaken ? 'border-gray-200' : 'border-[#4b4efc]'} transition-all active:translate-y-1">
                ${isTaken ? 'UNDO TAKEN' : 'I TOOK THIS'}
              </button>
            `;
            section.appendChild(card);
          });
          container.appendChild(section);
        }
      } catch (error) {
        document.getElementById('medication-container').innerHTML =
          `<p class="text-red-500 text-center">Server not found. Please run Dashboard.py first.</p>`;
      }
    }

    // 2. 약 복용 처리
    async function takeMedication(medId) {
      const response = await fetch(`${API_BASE}/api/medications/log`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ med_id: medId })
      });
      if (response.ok) loadDashboard();
    }

    // 3. 복용 취소 처리
    async function undoMedication(medId) {
      const response = await fetch(`${API_BASE}/api/undo-medication/${medId}`, { method: 'POST' });
      if (response.ok) loadDashboard();
    }

    window.onload = loadDashboard;
  </script>
</body>

</html>
