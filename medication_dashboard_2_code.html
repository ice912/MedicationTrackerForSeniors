<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Medication Dashboard</title>
<!-- Load Tailwind CSS v3 with forms and container-queries plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="typography">
    /* Enhancing readability for seniors with slightly increased line heights */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.6;
    }
    .large-text-btn {
      font-size: 1.25rem;
      font-weight: 700;
    }
  </style>
<style data-purpose="color-theme">
    /* High contrast but warm color palette */
    :root {
      --bg-warm: #FFFBF5;
      --card-bg: #FFFFFF;
      --accent-warm: #E67E22; /* Orange for visibility */
      --status-taken: #27AE60;
      --status-pending: #F1C40F;
      --text-main: #2C3E50;
    }
    body {
      background-color: var(--bg-warm);
      color: var(--text-main);
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head>
<body class="min-h-screen p-4">
<!-- BEGIN: MainHeader -->
<header class="mb-8 pt-4 flex justify-between items-start" data-purpose="header">
<h1 class="text-4xl font-extrabold text-gray-900">My Daily Meds</h1><button aria-label="Emergency SOS" class="bg-red-600 text-white px-4 py-2 rounded-xl flex items-center gap-2 shadow-lg hover:bg-red-700 active:scale-95 transition-transform border-b-4 border-red-800">
<span class="material-symbols-outlined font-bold">emergency</span>
<span class="font-black text-lg uppercase">SOS</span>
</button>
<p class="text-xl text-gray-600 font-semibold" id="current-date">Today, Wednesday Oct 25</p>
</header>
<!-- END: MainHeader -->
<!-- BEGIN: DashboardContent -->
<main class="space-y-8 pb-24">
<!-- SECTION: Morning Meds -->
<section data-purpose="medication-group">
<div class="flex items-center gap-3 mb-4">
<span class="p-2 bg-orange-100 rounded-full">
<!-- Sunrise Icon -->
<svg class="w-8 h-8 text-orange-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.344l-.707-.707M12 5a7 7 0 000 14a7 7 0 000-14z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<h2 class="text-3xl font-bold">Morning</h2>
</div>
<!-- Medication Card 1 -->
<article class="bg-white rounded-3xl shadow-lg border-2 border-gray-100 p-5 mb-4" data-purpose="medication-item">
<div class="flex justify-between items-start mb-4">
<div>
<h3 class="text-2xl font-black text-gray-900">Lisinopril</h3>
<p class="text-lg text-gray-700 mt-1">For high blood pressure</p>
</div>
<div class="flex flex-col items-center">
<span class="text-green-600">
<svg class="w-10 h-10" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" fill-rule="evenodd"></path>
</svg>
</span>
<span class="text-sm font-bold text-green-700 uppercase">Taken</span>
</div>
</div>
<button class="w-full bg-gray-100 text-gray-500 py-4 rounded-2xl large-text-btn cursor-not-allowed border-b-4 border-gray-200" disabled="">
          Already Taken
        </button>
</article>
<!-- Medication Card 2 -->
<article class="bg-white rounded-3xl shadow-lg border-2 border-gray-100 p-5" data-purpose="medication-item">
<div class="flex justify-between items-start mb-4">
<div>
<h3 class="text-2xl font-black text-gray-900">Multivitamin</h3>
<p class="text-lg text-gray-700 mt-1">General health</p>
</div>
<div class="flex flex-col items-center">
<span class="text-yellow-500">
<svg class="w-10 h-10" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" fill-rule="evenodd"></path>
</svg>
</span>
<span class="text-sm font-bold text-yellow-700 uppercase">Pending</span>
</div>
</div>
<button class="w-full bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-2xl large-text-btn shadow-md border-b-4 border-orange-700 active:translate-y-1 active:border-b-0 transition-all">
          I TOOK THIS
        </button>
</article>
</section>
<!-- SECTION: Afternoon Meds -->
<section data-purpose="medication-group">
<div class="flex items-center gap-3 mb-4 mt-10">
<span class="p-2 bg-yellow-100 rounded-full">
<!-- Sun Icon -->
<svg class="w-8 h-8 text-yellow-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.344l-.707-.707M12 5a7 7 0 110 14 7 7 0 010-14z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<h2 class="text-3xl font-bold">Afternoon</h2>
</div>
<article class="bg-white rounded-3xl shadow-lg border-2 border-gray-100 p-5" data-purpose="medication-item">
<div class="flex justify-between items-start mb-4">
<div>
<h3 class="text-2xl font-black text-gray-900">Metformin</h3>
<p class="text-lg text-gray-700 mt-1">For blood sugar</p>
</div>
<div class="flex flex-col items-center opacity-40">
<span class="text-gray-400">
<svg class="w-10 h-10" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" fill-rule="evenodd"></path>
</svg>
</span>
</div>
</div>
<button class="w-full bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-2xl large-text-btn shadow-md border-b-4 border-orange-700 active:translate-y-1 active:border-b-0 transition-all">
          I TOOK THIS
        </button>
</article>
</section>
<!-- SECTION: Evening Meds -->
<section data-purpose="medication-group">
<div class="flex items-center gap-3 mb-4 mt-10">
<span class="p-2 bg-indigo-100 rounded-full">
<!-- Moon Icon -->
<svg class="w-8 h-8 text-indigo-600" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</span>
<h2 class="text-3xl font-bold">Evening</h2>
</div>
<article class="bg-white rounded-3xl shadow-lg border-2 border-gray-100 p-5" data-purpose="medication-item">
<div class="flex justify-between items-start mb-4">
<div>
<h3 class="text-2xl font-black text-gray-900">Atorvastatin</h3>
<p class="text-lg text-gray-700 mt-1">For cholesterol</p>
</div>
<div class="flex flex-col items-center opacity-40">
<span class="text-gray-400">
<svg class="w-10 h-10" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z" fill-rule="evenodd"></path>
</svg>
</span>
</div>
</div>
<button class="w-full bg-orange-500 hover:bg-orange-600 text-white py-5 rounded-2xl large-text-btn shadow-md border-b-4 border-orange-700 active:translate-y-1 active:border-b-0 transition-all">
          I TOOK THIS
        </button>
</article>
</section>
</main>
<!-- END: DashboardContent -->
<!-- BEGIN: BottomNavigation -->
<nav class="fixed bottom-0 left-0 right-0 bg-white border-t-4 border-gray-100 px-6 py-4 flex justify-around items-center" data-purpose="navigation">
<button class="flex flex-col items-center text-orange-600">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-xs font-bold uppercase mt-1">Home</span>
</button>
<button class="flex flex-col items-center text-gray-400">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 6v6m0 0v6m0-6h6m-6 0H6" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-xs font-bold uppercase mt-1">Add New</span>
</button>
<button class="flex flex-col items-center text-gray-400">
<svg class="w-8 h-8" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
<span class="text-xs font-bold uppercase mt-1">Profile</span>
</button>
</nav>
<!-- END: BottomNavigation -->
<script data-purpose="current-date-updater">
    // Simple script to set current date display
    const dateEl = document.getElementById('current-date');
    const now = new Date();
    const options = { weekday: 'long', month: 'short', day: 'numeric' };
    dateEl.innerText = `Today, ${now.toLocaleDateString('en-US', options)}`;
  </script>
</body></html>
